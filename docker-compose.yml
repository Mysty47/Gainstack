version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: gainstack-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: gainstack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  minio:
    image: minio/minio
    container_name: gainstack-minio
    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

    command: server /data --console-address ":9001"


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: gainstack-backend
    restart: unless-stopped

    ports:
      - "8080:8080"

    depends_on:
      - postgres
      - minio

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gainstack
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password

      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: gainstack-frontend
    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend


volumes:
  postgres_data:
  minio_data: