version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gainstack-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: gainstack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: