version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gainstack-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: gainstack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  minio:
    image: minio/minio
    container_name: gainstack-minio
    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

    command: server /data --console-address ":9001"


volumes:
  postgres_data:
  minio_data: